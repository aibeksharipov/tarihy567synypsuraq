<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мысал</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "Times New Roman", Times, serif;
            font-size: 48px;
            text-align: center;
            background-color: #f0f0f0;
        }
        img {
            max-width: 90%;
            max-height: 90%;
        }
    </style>
</head>
<body>
    <div id="question">
        Жүктелуде...
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const classNum = params.get('class');
        const questionNum = params.get('question');

        if (classNum && questionNum) {
            const baseUrl = `https://aibeksharipov.github.io/tarihy567synypsuraq/${classNum}/${questionNum}`;
            
            // Сурет файлының кеңейтімін тексеру
            const imgExtensions = ['.png', '.jpg', '.jpeg'];
            let isImage = imgExtensions.some(ext => questionNum.endsWith(ext) || `${baseUrl}`.endsWith(ext));

            if (isImage) {
                const img = document.createElement('img');
                img.src = `${baseUrl}`;
                img.alt = "Сурет жүктелуде...";
                document.getElementById('question').innerHTML = '';
                document.getElementById('question').appendChild(img);
            } else {
                // Текст файлын жүктеу
                fetch(`${baseUrl}.txt`)
                    .then(response => {
                        if (!response.ok) throw new Error('Файл табылмады');
                        return response.text();
                    })
                    .then(text => {
                        document.getElementById('question').textContent = text;
                    })
                    .catch(err => {
                        document.getElementById('question').textContent = `Қате: ${err.message}`;
                    });
            }
        } else {
            document.getElementById('question').textContent = 'Параметрлер табылмады';
        }
    </script>
</body>
</html>
